name: ghosty
description: Ghosty — a personal music player (fork of BlackHole by Ankit Sangwan, maintained by BrightDV).

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.16.1+44

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  app_links: ^3.5.0
  audio_service: ^0.18.12
  audiotagger: ^2.2.1
  # bitsdojo_window: ^0.1.1+1 #For Desktops
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  connectivity_plus: ^5.0.2
  cupertino_icons: ^1.0.6
  dart_des: ^1.0.2
  device_info_plus: ^9.1.1
  # ffmpeg_kit_flutter_audio: ^6.0.3
  file_picker: ^8.1.4
  flip_card: ^0.7.0
  flutter:
    sdk: flutter
  flutter_archive: ^6.0.0
  flutter_displaymode: ^0.6.0
  # flutter_downloader: ^1.7.1
  flutter_localizations:
    sdk: flutter
  flutter_lyric:
    path: ./flutter_lyric
  get_it: ^7.6.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # home_widget: ^0.3.0
  html_unescape: ^2.0.0
  just_audio: ^0.9.36
  # Discontinued, Use just_audio_windows instead.
  # For Linux use just_audio_mpv.
  # just_audio_libwinmedia: ^0.0.4 # For windows and linux.
  logging: ^1.2.0
  marquee: ^2.2.3
  material_design_icons_flutter: 5.0.5955-rc.1
  media_store_plus: ^0.0.7
  metadata_god: ^0.5.2+1
  on_audio_query: ^2.9.0
  package_info_plus: ^8.3.0
  palette_generator: ^0.3.3+3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  persistent_bottom_nav_bar: ^6.2.1
  receive_sharing_intent: ^1.6.7
  share_plus: ^7.2.1
  sizer: ^2.0.15
  sliding_up_panel: ^2.0.0+1
  url_launcher: ^6.2.4
  uuid: ^3.0.7
  # workmanager: ^0.5.1
  youtube_explode_dart: ^2.3.6

dependency_overrides:
 fading_edge_scrollview: ^4.1.1
 win32: ^5.13.0
 flutter_plugin_android_lifecycle: ^2.0.27
 path_provider_android: ^2.2.10
 url_launcher_android: ^6.3.0
 shared_preferences_android: ^2.3.0
 permission_handler_android: ^12.0.11
 connectivity_plus: ^6.0.0
 device_info_plus: ^10.0.0
 share_plus: ^10.0.0
 sqflite: ^2.3.3+1
 sqflite_android: ^2.3.0
 sqflite_darwin: ^2.3.0
 sqflite_platform_interface: ^2.3.0
 audiotagger:
  git:
   url: https://github.com/AmanpreetYatin/Audiotagger
   ref: 1185e20b73dee903f0b1ffce7b3cacdd1b2f3916

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.3.0
  msix: ^3.16.7

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets to the application.
    - assets/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/Poppins-Regular.ttf
        - asset: assets/Poppins-Medium.otf
          weight: 600

msix_config:
  display_name: Ghosty
  publisher_display_name: Amritesh Khare
  identity_name: com.ghosty.app
  icons_background_color: transparent
  logo_path: assets/ic_launcher.png
  file_extension: .mp3, .m4a
